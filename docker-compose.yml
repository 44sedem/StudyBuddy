version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: studybuddy
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: studybuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  ai_worker:
    build: ./ai_engine
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    volumes:
      - ./ai_engine:/ai_engine

volumes:
  postgres_data:
